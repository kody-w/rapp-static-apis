name: build
# rapp-static-api/1.0 — the only build step. Rebuild on push + every 6h; commit ONLY real changes.
on:
  push:
    branches: [ main ]
    paths: [ "manifest.json", "build.py", ".github/workflows/build.yml" ]
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: build
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 build.py
      - name: Commit only real changes
        run: |
          git config user.name "static-api"
          git config user.email "actions@users.noreply.github.com"
          git add -A versions registry.json api
          git diff --cached --quiet || { git commit -m "static-api: rebuild [skip ci]"; git push; }
