<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Companion — talk to a hologram organism</title>
<style>
 :root{--bg:#080b11;--panel:#111825;--line:#243044;--ink:#e9eef7;--muted:#8593a6;--accent:#6cb0ff;--warm:#ffb672;--good:#54d98c}
 *{box-sizing:border-box}
 html,body{margin:0;height:100%}
 body{background:radial-gradient(120% 90% at 50% -10%,#0e1626 0%,var(--bg) 60%);color:var(--ink);font-family:-apple-system,system-ui,Segoe UI,sans-serif;line-height:1.5}
 a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
 code{font-family:ui-monospace,Menlo,monospace;font-size:.85em}
 .wrap{max-width:1000px;margin:0 auto;padding:20px 16px 28px;min-height:100%;display:flex;flex-direction:column}
 header{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px}
 header h1{font-size:20px;margin:0;letter-spacing:-.3px}
 header .born{color:var(--muted);font-size:13px}
 .grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);gap:16px;flex:1;min-height:0;margin-top:10px}
 @media(max-width:760px){.grid{grid-template-columns:1fr}}
 .stage{position:relative;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#05080e;min-height:300px;aspect-ratio:1/1;max-height:60vh}
 .stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
 .stage .hint{position:absolute;left:12px;bottom:10px;font-size:11px;color:var(--muted);text-shadow:0 1px 3px #000;pointer-events:none}
 .chat{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:18px;background:var(--panel);min-height:300px;overflow:hidden}
 #log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
 .msg{max-width:88%;padding:9px 13px;border-radius:14px;font-size:14.5px;white-space:pre-wrap;word-break:break-word}
 .msg.them{align-self:flex-start;background:#0e1a2b;border:1px solid #22344c;border-bottom-left-radius:5px}
 .msg.me{align-self:flex-end;background:#173154;color:#eaf3ff;border-bottom-right-radius:5px}
 .msg.sys{align-self:center;color:var(--muted);font-size:12.5px;background:none;text-align:center;max-width:100%}
 .msg.them .who{color:var(--warm);font-size:11px;font-weight:700;letter-spacing:.02em;display:block;margin-bottom:2px}
 .typing{align-self:flex-start;color:var(--muted);font-size:13px;padding:4px 13px}
 .bar{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}
 #say{flex:1;background:#0a1220;border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:10px 13px;font:inherit;font-size:14.5px}
 #say:focus{outline:none;border-color:var(--accent)}
 #send{background:#173154;color:#eaf3ff;border:1px solid #2f5f9c;border-radius:11px;padding:0 16px;font:inherit;font-weight:600;cursor:pointer}
 #send:disabled{opacity:.45;cursor:default}
 .status{margin-top:12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;min-height:18px}
 .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:none}
 .dot.work{background:var(--warm);animation:pulse 1.1s infinite} .dot.ok{background:var(--good)} .dot.err{background:#ff8080}
 @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
 .foot{margin-top:10px;font-size:11.5px;color:var(--muted)}
</style></head>
<body>
<div class="wrap">
 <header><h1 id="name">a companion</h1><span class="born" id="born"></span></header>

 <div class="grid">
  <div class="stage"><iframe id="creature" title="the creature"></iframe><div class="hint">drag to look around</div></div>
  <div class="chat">
   <div id="log"></div>
   <div class="bar">
    <input id="say" placeholder="say hello…" autocomplete="off" disabled>
    <button id="send" disabled>Send</button>
   </div>
  </div>
 </div>

 <div class="status"><span class="dot" id="dot"></span><span id="statusText">loading…</span></div>
 <div class="foot">Its mind is <b>real CPython</b>, cold-booted in a verified sandbox on your device — its whole self is the moment it was born. Nothing you say leaves your browser. <span id="offnote"></span></div>
</div>

<script>
const $=id=>document.getElementById(id);
// URL token uses base64url (player convention); Python injection uses standard base64.
const b64urlToStr=t=>decodeURIComponent(escape(atob(t.replace(/-/g,'+').replace(/_/g,'/'))));
const strToStdB64=s=>btoa(unescape(encodeURIComponent(s)));
const b64url=s=>btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
const setStatus=(t,cls)=>{$('statusText').textContent=t;$('dot').className='dot'+(cls?' '+cls:'');};

const DEFAULT_CART={schema:'hologram-cartridge/1.0',id:'d45a79d29e99',title:'Lumina',author:'@kody-w',
 born:{coord:'gcpuvpk44kd8·1719772800000',from:'live 14°C · code 2 · wind 6 · night'},parents:[],
 genome:{layers:[{role:'form',k:30,shape:'ring',limbs:3,segments:7,symmetry:'radial',body_r:0.3,limb_len:0.35,spikes:2},
 {role:'surface',k:80,palette:['#7fd4ff','#b6e8ff','#4aa3e0','#e8f7ff'],pattern:'glow',glow:0.6,opacity:0.92},
 {role:'motion',k:55,breathe:0.2,drift:0.2,pulse:0.35,reach:0.25}],compose:{windows:[[0,1,2]],loop:true}}};

function loadCart(){
 try{ const h=location.hash.slice(1);
  if(h.startsWith('token=')) return JSON.parse(b64urlToStr(h.slice(6)));
  if(h) return JSON.parse(b64urlToStr(h));
 }catch(e){}
 const u=new URLSearchParams(location.search).get('cart');
 if(u) return u; // a URL to fetch
 return DEFAULT_CART;
}

let CART=null;
async function resolveCart(c){ if(typeof c==='string'){ const r=await fetch(c); return await r.json(); } return c; }

function humanBorn(cart){
 const from=(cart.born&&cart.born.from)||''; return from||'a kept moment';
}

// ---------- the vbrainstem cell: boot CPython, inject the brain ----------
const VBS_SRC='../vbrainstem-cell/sandbox.html';
function bootVbrainstem(){
 return new Promise((resolve,reject)=>{
  const iframe=document.createElement('iframe'); iframe.style.display='none'; iframe.setAttribute('aria-hidden','true');
  iframe.setAttribute('sandbox','allow-scripts'); const pending=new Map(); let nid=1,port,started=false;
  iframe.addEventListener('load',()=>{ if(started)return; started=true;
   const ch=new MessageChannel(); port=ch.port1;
   port.onmessage=e=>{ const d=e.data||{};
    if('booted' in d){ const op=msg=>new Promise((res,rej)=>{const id=nid++;pending.set(id,{res,rej});port.postMessage({id,...msg});}); resolve({runtime:d.runtime,op}); return; }
    if('boot_error' in d){ reject(new Error(d.boot_error)); return; }
    if(d.ready) return;
    const p=pending.get(d.id); if(!p)return; pending.delete(d.id); d.ok?p.res(d.result):p.rej(new Error(d.error)); };
   iframe.contentWindow.postMessage('vbs-init','*',[ch.port2]); });
  iframe.src=VBS_SRC; document.body.appendChild(iframe);
  setTimeout(()=>reject(new Error('timeout')),90000);
 });
}

// ---------- chat ----------
function bubble(cls,text,who){ const d=document.createElement('div'); d.className='msg '+cls;
 if(who){const w=document.createElement('span');w.className='who';w.textContent=who;d.appendChild(w);}
 d.appendChild(document.createTextNode(text)); $('log').appendChild(d); $('log').scrollTop=$('log').scrollHeight; return d; }

let VBS=null, thinking=false;
// use the eval's return VALUE (Pyodide's batched stdout only flushes on a newline, so print(end="") is lost)
async function ask(pyExprB64){ const r=await VBS.op({op:'eval',code:'import base64\n'+
 'COMPANION.respond(base64.b64decode("'+pyExprB64+'").decode("utf-8"))'});
 return (r.value||'').trim(); }

async function send(){
 if(thinking||!VBS) return; const text=$('say').value.trim(); if(!text) return;
 $('say').value=''; bubble('me',text);
 thinking=true; $('send').disabled=true;
 const t=document.createElement('div'); t.className='typing'; t.textContent=CART.title+' is thinking…'; $('log').appendChild(t); $('log').scrollTop=$('log').scrollHeight;
 try{ const reply=await ask(strToStdB64(text)); t.remove(); bubble('them',reply||'…',CART.title); }
 catch(e){ t.remove(); bubble('sys','(its mind flickered — '+(e.message||e)+')'); }
 thinking=false; $('send').disabled=false; $('say').focus();
}

async function main(){
 CART=await resolveCart(loadCart());
 $('name').textContent=CART.title||'a companion';
 $('born').textContent='· born under '+humanBorn(CART);
 $('creature').src='../hologram/player.html#'+b64url(JSON.stringify(CART));
 document.title=(CART.title||'Companion')+' — companion';

 setStatus('waking its mind — cold-booting CPython in a verified cell (first time downloads Pyodide)…','work');
 let brainSrc;
 try{ brainSrc=await (await fetch('brain.py')).text(); }
 catch(e){ setStatus('could not load its mind (brain.py)','err'); return; }
 try{
  VBS=await bootVbrainstem();
  const inject=brainSrc+'\nimport json,base64\nCOMPANION=Companion(json.loads(base64.b64decode("'+strToStdB64(JSON.stringify(CART))+'").decode("utf-8")))\n';
  await VBS.op({op:'eval',code:inject});
  const g=await VBS.op({op:'eval',code:'COMPANION.greeting()'});
  setStatus('awake · real CPython '+String(VBS.runtime||'').split(' ')[0]+' · nothing left your device','ok');
  bubble('them',(g.value||'Hello.').trim(),CART.title);
  $('say').disabled=false; $('send').disabled=false; $('say').focus();
 }catch(e){
  setStatus('its mind needs a network the first time (to fetch Pyodide) — but here is who it is','err');
  $('offnote').innerHTML='The brain runs on Pyodide (WebAssembly CPython), fetched once from a CDN; offline, the creature still shows but can’t speak.';
  bubble('sys','I couldn’t wake fully, but I can tell you what I am: '+(CART.born&&CART.born.from?('I was born under '+CART.born.from+'.'):'a kept moment.'));
 }
}

$('send').onclick=send;
$('say').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }});
main();
</script>
</body></html>
