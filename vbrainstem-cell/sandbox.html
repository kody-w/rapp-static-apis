<!doctype html><html lang="en"><head><meta charset="utf-8"><title>vbrainstem cell</title></head><body>
<script type="module">
/* Headless vBrainstem cell — real CPython (Pyodide / WebAssembly bytecode) running inside a
   sandboxed, opaque-origin iframe (sandbox="allow-scripts", no allow-same-origin: no access to the
   host DOM/cookies/storage). It talks to the host ONLY over a private MessagePort, and it runs RAR
   agents with VERIFY-BEFORE-EXEC: fetch the agent source -> SHA-256 -> match RAR's published
   _sha256 -> refuse on mismatch -> exec in Pyodide. No server: the CPU is the caller's.

   This is the same shape as /api's sandbox.html — the payload is just an entire agent runtime. */

const PYODIDE = "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/";
const RAR = "https://raw.githubusercontent.com/kody-w/RAR/main";
let py = null, reg = null;

async function boot() {
  const { loadPyodide } = await import(PYODIDE + "pyodide.mjs");
  py = await loadPyodide({ indexURL: PYODIDE });
  return py.runPython("import sys; sys.version");
}

async function sha256hex(buf) {
  const d = await crypto.subtle.digest("SHA-256", buf);
  return [...new Uint8Array(d)].map((b) => b.toString(16).padStart(2, "0")).join("");
}
async function registry() {
  if (!reg) reg = await (await fetch(RAR + "/registry.json")).json();
  return reg.agents || reg.entries || [];
}
function pyRun(code) {
  let out = "";
  py.setStdout({ batched: (s) => (out += s + "\n") });
  py.setStderr({ batched: (s) => (out += s + "\n") });
  const val = py.runPython(code);
  py.setStdout({}); py.setStderr({});
  return { value: val == null ? null : String(val), stdout: out.trimEnd() };
}

async function op(msg) {
  const { op, code, slug, grep } = msg;
  if (op === "health")
    return { status: "ok", runtime: py.runPython("import sys; sys.version"),
             server: "none — Pyodide bytecode in a sandboxed iframe", origin: location.origin };
  if (op === "eval") return pyRun(code);
  if (op === "agents") {
    const a = (await registry()).map((x) => ({ slug: x.name || x.slug, desc: x.description }));
    const f = grep ? a.filter((x) => JSON.stringify(x).toLowerCase().includes(grep.toLowerCase())) : a;
    return { total: a.length, agents: f.slice(0, 40) };
  }
  if (op === "run") {
    const ag = (await registry()).find((x) => (x.name || x.slug) === slug);
    if (!ag) throw new Error("no agent: " + slug);
    const buf = await (await fetch(RAR + "/" + (ag._file || `agents/${slug}.py`))).arrayBuffer();
    const got = await sha256hex(buf);
    if (ag._sha256 && got !== ag._sha256)
      throw new Error(`verify-before-exec FAILED — ${got.slice(0, 12)} != pinned ${ag._sha256.slice(0, 12)}`);
    const source = new TextDecoder().decode(buf);
    const r = pyRun(source); // exec the verified agent source in CPython
    return { verified_sha8: got.slice(0, 12), agent: slug, lines: source.split("\n").length,
             stdout: r.stdout, value: r.value };
  }
  throw new Error("unknown op: " + op);
}

window.addEventListener("message", function onInit(e) {
  if (e.data !== "vbs-init" || !e.ports || !e.ports[0]) return;
  window.removeEventListener("message", onInit);
  const port = e.ports[0];
  port.onmessage = async (ev) => {
    const { id } = ev.data;
    try { port.postMessage({ id, ok: true, result: await op(ev.data) }); }
    catch (err) { port.postMessage({ id, ok: false, error: String((err && err.message) || err) }); }
  };
  boot().then((v) => port.postMessage({ booted: true, runtime: v }))
        .catch((err) => port.postMessage({ boot_error: String((err && err.message) || err) }));
});
</script></body></html>
