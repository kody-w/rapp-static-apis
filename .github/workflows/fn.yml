name: Build RAPP static fn

# Content-addresses the compute cells (rapp-static-api/1.0, executable variant) when they change.
# Idempotent + stable-write; append-only — a published versions/ frame is never rewritten.

on:
  push:
    paths:
      - 'fn/cells/**'
      - 'fn/manifest.json'
      - 'fn/build.py'
      - '.github/workflows/fn.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build the cells
        run: python fn/build.py
      - name: Commit only real changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "RAPP Fn Bot"
          git config user.email "rapp-bot@users.noreply.github.com"
          git add fn/versions fn/api fn/registry.json
          git diff --cached --quiet || git commit -m "Rebuild static fn cells [skip ci]"
          git push
