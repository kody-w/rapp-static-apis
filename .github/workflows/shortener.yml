name: Build RAPP static shortener

# Rebuilds the static URL shortener (rapp-static-api/1.0) when links change.
# Idempotent + stable-write, so it only commits real changes. Append-only: the
# versions/ store (every destination a slug has ever had) is never rewritten.

on:
  push:
    paths:
      - 'shortener/seed/**'
      - 'shortener/manifest.json'
      - 'shortener/build.py'
      - '.github/workflows/shortener.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build the shortener
        run: python shortener/build.py
      - name: Commit only real changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "RAPP Shortener Bot"
          git config user.email "rapp-bot@users.noreply.github.com"
          git add shortener/u shortener/versions shortener/api shortener/registry.json
          git diff --cached --quiet || git commit -m "Rebuild static shortener [skip ci]"
          git push
