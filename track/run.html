<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>tracker</title>
<style>
 body{margin:0;font-family:-apple-system,system-ui,Segoe UI,sans-serif;background:#0d1117;color:#e6edf3;
   min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
 .card{border:1px solid #30363d;border-radius:18px;padding:28px 32px;background:#161b22;max-width:22rem;width:100%;text-align:center}
 .title{color:#8b949e;font-size:.95rem;letter-spacing:.02em}
 .val{font-size:3rem;font-weight:800;letter-spacing:-.02em;margin:6px 0;word-break:break-word}
 .unit{color:#8b949e;font-size:1.1rem;font-weight:600}
 .meta{font-family:ui-monospace,Menlo,monospace;font-size:.7rem;color:#6b7280;word-break:break-all;margin-top:14px}
 .ok{color:#3fb950;font-weight:700}.err{color:#f85149}
 a{color:#58a6ff;text-decoration:none} button{font:inherit;font-size:.75rem;cursor:pointer;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:7px;padding:4px 10px;margin-top:12px}
</style></head><body>
<div class="card" id="card">
  <div class="title" id="title">tracker</div>
  <div class="val" id="val">…</div>
  <div class="meta" id="meta">running in a sandboxed iframe on your device…</div>
</div>
<iframe id="cell" src="sandbox.html" sandbox="allow-scripts" style="display:none" aria-hidden="true"></iframe>
<script>
const $=id=>document.getElementById(id);
function b64urlDecode(s){ s=String(s).replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; return decodeURIComponent(escape(atob(s))); }
let spec={}; try{ spec=JSON.parse(b64urlDecode((location.hash||'#').slice(1))); }catch(e){}
if(spec.title) $('title').textContent=spec.title;

// ---- sandbox RPC (verify-before-act, same shape as /api) ----
const iframe=$('cell'); let port,ready; const readyP=new Promise(r=>ready=r); const pending=new Map(); let nid=1;
iframe.addEventListener('load',()=>{
  const ch=new MessageChannel(); port=ch.port1;
  port.onmessage=e=>{ const d=e.data;
    if(d.ready){ready();return;} if('booted' in d||'boot_error' in d)return;
    const p=pending.get(d.id); if(!p)return; pending.delete(d.id); d.ok?p.resolve(d):p.reject(new Error(d.error)); };
  iframe.contentWindow.postMessage('rapp-fn-init','*',[ch.port2]);
});
let REG; const bytesCache=new Map();
async function bytesFor(pin_path){ if(!bytesCache.has(pin_path)) bytesCache.set(pin_path, await (await fetch(new URL(pin_path,location.href))).arrayBuffer()); return bytesCache.get(pin_path).slice(0); }
async function call(cellName,fn,args){
  await readyP;
  const entry=(REG.entries||[]).find(e=>e.name===cellName); if(!entry) throw new Error('no cell '+cellName);
  const bytes=await bytesFor(entry.pin_path); const id=nid++;
  const res=await new Promise((resolve,reject)=>{ pending.set(id,{resolve,reject}); port.postMessage({id,bytes,sha8:entry.sha8,fn,args}); });
  return { ...res, sha8: entry.sha8 };
}
async function tick(){
  try{
    const r=await call('extract','extract',{src:spec.src,url:spec.url,path:spec.path,title:spec.title,unit:spec.unit});
    const v=r.result?.value;
    $('val').innerHTML = (v==null?'—':String(v)) + (spec.unit?` <span class="unit">${spec.unit}</span>`:'');
    $('meta').innerHTML = `verified <span class="ok">${r.sha8} ✓</span> · fetched on your device, no server<br>` +
      `<a href="${spec.src||spec.url||'#'}" target="_blank" rel="noopener">source</a> · ${new Date().toLocaleTimeString()}`;
  }catch(e){ $('val').innerHTML='<span class="err">error</span>'; $('meta').textContent=String(e.message||e); }
}
(async()=>{
  if(!spec.src && !spec.url){ $('val').textContent='—'; $('meta').innerHTML='No tracker spec. <a href="./">Build one →</a>'; return; }
  REG=await (await fetch('registry.json',{cache:'no-store'})).json();
  await tick();
  if(spec.r && Number(spec.r)>=5) setInterval(tick, Number(spec.r)*1000);
})();
</script></body></html>
