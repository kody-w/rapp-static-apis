<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hologram player</title>
<style>
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,system-ui,Segoe UI,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
 a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}
 .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px}
 #wrap{display:flex;flex-direction:column;align-items:center;padding:20px 16px;max-width:960px;margin:0 auto}
 #header{width:100%;display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
 #title{font-size:1.4rem;font-weight:800;margin:0}
 #meta{color:#8b949e;font-size:12px}
 #stage{position:relative;width:100%;max-width:480px}
 canvas{display:block;width:100%;border-radius:14px;background:#010409;border:1px solid #30363d}
 #verify{position:absolute;bottom:8px;right:10px;font-size:10px;font-family:ui-monospace,Menlo,monospace;color:#3fb950;background:rgba(1,4,9,0.75);padding:2px 7px;border-radius:20px;pointer-events:none}
 #verify.mismatch{color:#f0b429}
 #controls{width:100%;max-width:480px;margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
 button{font:inherit;font-size:12px;cursor:pointer;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:7px;padding:5px 12px}
 button:hover{background:#30363d}
 button.primary{background:#238636;border-color:#238636;color:#fff}
 button.primary:hover{filter:brightness(1.1)}
 #load-row{width:100%;max-width:480px;margin-top:10px;display:flex;gap:6px}
 #load-row input{flex:1;background:#010409;border:1px solid #30363d;border-radius:7px;color:#e6edf3;padding:5px 9px;font:inherit;font-size:12px}
 #info-row{width:100%;max-width:480px;margin-top:8px;font-size:11px;color:#8b949e;display:flex;gap:14px;flex-wrap:wrap}
 #json-area{width:100%;max-width:480px;margin-top:12px}
 #json-area textarea{width:100%;min-height:120px;background:#010409;border:1px solid #30363d;border-radius:8px;color:#e6edf3;padding:8px;font-family:ui-monospace,Menlo,monospace;font-size:11px;resize:vertical}
 #json-area .row{display:flex;gap:6px;margin-top:5px}
 #qr-wrap{margin-top:10px;width:100%;max-width:480px;text-align:center}
 canvas.qr{border-radius:8px;background:#fff;image-rendering:pixelated;display:inline-block}
 #qr-link{word-break:break-all;font-size:10.5px;color:#8b949e;margin-top:4px}
 .err{color:#f85149}
 @media(min-width:700px){
  #wrap{flex-direction:row;align-items:flex-start;gap:24px;flex-wrap:wrap}
  #header{grid-column:1/-1;width:100%}
  #stage,#controls,#load-row,#info-row,#json-area,#qr-wrap{max-width:340px}
 }
</style></head><body>
<div id="wrap">
 <div id="header">
  <h1 id="title">🌀 hologram</h1>
  <span id="meta" class="mono"></span>
 </div>

 <div id="stage">
  <canvas id="canvas" width="480" height="480"></canvas>
  <div id="verify" style="display:none"></div>
 </div>

 <div style="display:flex;flex-direction:column;gap:0;flex:1;min-width:240px">
  <div id="controls">
   <button id="btn-dl">↓ download .json</button>
   <button id="btn-link">copy link</button>
   <button id="btn-qr">QR</button>
   <a href="index.html"><button>gallery →</button></a>
  </div>
  <div id="load-row">
   <input id="cart-url" placeholder="cartridge URL or paste JSON…">
   <button class="primary" id="btn-load">load</button>
  </div>
  <div id="info-row">
   <span id="i-title"></span>
   <span id="i-author"></span>
   <span id="i-id" class="mono"></span>
  </div>
  <div id="json-area">
   <textarea id="cart-json" spellcheck="false" placeholder="paste hologram-cartridge/1.0 JSON here…"></textarea>
   <div class="row">
    <button id="btn-apply">apply JSON</button>
    <input type="file" id="file-in" accept=".json" style="display:none">
    <button id="btn-file">open file…</button>
   </div>
  </div>
  <div id="qr-wrap" style="display:none">
   <canvas class="qr" id="qr"></canvas>
   <div id="qr-link" class="mono"></div>
  </div>
 </div>
</div>

<script type="module">
/* ── Renderer ─────────────────────────────────────────────────────────────── */
const TAU = Math.PI * 2;

function hexA(hex, a) {
  if (!hex || hex.length < 7) return `rgba(68,136,255,${a})`;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

function applyFill(ctx, r, palette, pattern, t) {
  const p = (palette && palette.length) ? palette : ['#4488ff','#2255cc'];
  const n = p.length;
  if (pattern === 'solid') { ctx.fillStyle = p[0]; return; }
  if (pattern === 'stripe') {
    const g = ctx.createLinearGradient(-r, -r * 0.5, r, r * 0.5);
    for (let i = 0; i < n; i++) g.addColorStop(i / Math.max(n-1,1), p[i]);
    ctx.fillStyle = g; return;
  }
  if (pattern === 'glow') {
    const g = ctx.createRadialGradient(0, -r * 0.15, r * 0.05, 0, 0, r);
    g.addColorStop(0, n > 2 ? p[2] : '#ffffff');
    g.addColorStop(0.45, p[0]);
    g.addColorStop(1, hexA(p[n > 1 ? 1 : 0], 0.25));
    ctx.fillStyle = g; return;
  }
  if (pattern === 'spot') {
    const g = ctx.createRadialGradient(-r * 0.2, -r * 0.2, r * 0.05, 0, 0, r);
    for (let i = 0; i < n; i++) g.addColorStop(i / Math.max(n-1,1), p[i]);
    ctx.fillStyle = g; return;
  }
  ctx.fillStyle = p[0];
}

function drawBlob(ctx, r, segments, palette, pattern, t) {
  const n = Math.max(3, segments);
  const pts = [];
  for (let i = 0; i < n; i++) {
    const ang = (i / n) * TAU - TAU / 4;
    const w = 1 + 0.13 * Math.sin(ang * 3 + t * 1.8) * Math.cos(ang + t * 0.7);
    pts.push([Math.cos(ang) * r * w, Math.sin(ang) * r * w]);
  }
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const p0 = pts[i], p1 = pts[(i+1) % n];
    const mx = (p0[0]+p1[0])/2, my = (p0[1]+p1[1])/2;
    if (i === 0) ctx.moveTo(mx, my);
    ctx.quadraticCurveTo(p0[0], p0[1], mx, my);
  }
  ctx.closePath();
  applyFill(ctx, r, palette, pattern, t);
  ctx.fill();
}

function drawStar(ctx, outer, inner, points, palette, pattern, t) {
  const n = Math.max(3, points);
  ctx.beginPath();
  for (let i = 0; i < n * 2; i++) {
    const ang = (i / (n * 2)) * TAU - TAU / 4;
    const wave = i % 2 === 0 ? 1 + 0.04 * Math.sin(t * 2 + i) : 1;
    const rad = i % 2 === 0 ? outer * wave : inner;
    if (i === 0) ctx.moveTo(Math.cos(ang) * rad, Math.sin(ang) * rad);
    else ctx.lineTo(Math.cos(ang) * rad, Math.sin(ang) * rad);
  }
  ctx.closePath();
  applyFill(ctx, outer, palette, pattern, t);
  ctx.fill();
}

function drawSegmented(ctx, r, segments, palette, pattern, t) {
  const n = Math.max(2, segments);
  const sh = r * 0.42;
  for (let i = 0; i < n; i++) {
    const frac = i / Math.max(n-1,1);
    const scale = 0.6 + 0.4 * Math.sin(frac * Math.PI);
    const y = (i - (n-1)/2) * sh * 1.05;
    const sw = r * scale * (1 + 0.03 * Math.sin(t * 2 + i));
    ctx.beginPath();
    ctx.ellipse(0, y, sw, sh * 0.52, 0, 0, TAU);
    applyFill(ctx, sw, palette.slice(i % palette.length), pattern, t + i * 0.25);
    ctx.fill();
    if (i > 0) {
      ctx.beginPath();
      ctx.ellipse(0, y - sh * 0.52, sw * 0.45, sh * 0.18, 0, 0, TAU);
      ctx.fillStyle = hexA(palette[0], 0.5);
      ctx.fill();
    }
  }
}

function drawLimbs(ctx, r, limbLen, limbs, symmetry, palette, reach, t) {
  if (limbs < 1) return;
  const base = (palette && palette[1]) ? palette[1] : palette[0];
  const tip = (palette && palette.length > 1) ? palette[palette.length-1] : palette[0];
  ctx.lineWidth = Math.max(1.5, r * 0.07);
  ctx.lineCap = 'round';

  if (symmetry === 'radial') {
    for (let i = 0; i < limbs; i++) {
      const ang = (i / limbs) * TAU - TAU / 4;
      const wave = reach * Math.sin(t * 2.8 + i * 1.1);
      const sx = Math.cos(ang) * r * 0.78, sy = Math.sin(ang) * r * 0.78;
      const ex = Math.cos(ang + wave * 0.5) * (r + limbLen);
      const ey = Math.sin(ang + wave * 0.5) * (r + limbLen);
      const kx = Math.cos(ang + wave * 0.25) * (r + limbLen * 0.45);
      const ky = Math.sin(ang + wave * 0.25) * (r + limbLen * 0.45);
      const g = ctx.createLinearGradient(sx, sy, ex, ey);
      g.addColorStop(0, base); g.addColorStop(1, tip);
      ctx.strokeStyle = g;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.quadraticCurveTo(kx, ky, ex, ey); ctx.stroke();
    }
  } else { // bilateral
    const pairs = Math.floor(limbs / 2);
    for (let i = 0; i < pairs; i++) {
      const yo = (i - (pairs-1)/2) * r * 0.48;
      const wave = reach * Math.sin(t * 3 + i * 1.5);
      for (const side of [-1, 1]) {
        const sx = side * r * 0.45, sy = yo;
        const ex = side * (r * 0.45 + limbLen) + side * wave * limbLen * 0.5;
        const ey = yo + wave * limbLen * 0.3 * side;
        const kx = (sx + ex) / 2 + side * limbLen * 0.18;
        const ky = (sy + ey) / 2 - r * 0.15;
        const g = ctx.createLinearGradient(sx, sy, ex, ey);
        g.addColorStop(0, base); g.addColorStop(1, tip);
        ctx.strokeStyle = g;
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.quadraticCurveTo(kx, ky, ex, ey); ctx.stroke();
      }
    }
    if (limbs % 2 === 1) {
      const wave = reach * Math.sin(t * 2.2) * 0.35;
      ctx.strokeStyle = palette[0];
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.6);
      ctx.quadraticCurveTo(wave * limbLen, -r - limbLen * 0.5, 0, -r - limbLen * 0.92);
      ctx.stroke();
    }
  }
}

function renderFrame(ctx, genome, time) {
  const { layers, compose } = genome;
  const w = ctx.canvas.width, h = ctx.canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Active window for multi-state animation
  const WND_DUR = 1.8;
  const nw = (compose.windows || []).length;
  const winIdx = nw > 1 && compose.loop
    ? Math.floor(time / WND_DUR) % nw : 0;
  const active = new Set(compose.windows[winIdx] || []);

  // Collect layers by role (active layers take priority over fallback)
  const byRole = {};
  layers.forEach((l, i) => { if (!byRole[l.role] || active.has(i)) byRole[l.role] = l; });
  const form = byRole.form || {};
  const surface = byRole.surface || {};
  const motion = byRole.motion || {};

  // Motion params
  const breathe = (motion.breathe || 0) * Math.sin(time * TAU * 0.65);
  const driftAmt = motion.drift || 0;
  const driftX = driftAmt * Math.sin(time * 0.48) * w * 0.08;
  const driftY = driftAmt * Math.cos(time * 0.35) * h * 0.065;
  const pulseAmt = motion.pulse || 0;
  const pulse = pulseAmt * (0.5 + 0.5 * Math.sin(time * TAU * Math.max(pulseAmt, 0.2) * 1.3));
  const reach = motion.reach || 0;

  // Surface params
  const palette = surface.palette || ['#4488ff', '#2255cc'];
  const pattern = surface.pattern || 'solid';
  const glow = (surface.glow || 0) * (1 + pulse * 0.55);
  const opacity = surface.opacity != null ? surface.opacity : 1;

  // Form params
  const shape = form.shape || 'blob';
  const limbs = form.limbs || 0;
  const segments = form.segments || 6;
  const symmetry = form.symmetry || 'radial';
  const minDim = Math.min(w, h);
  const bodyR = (form.body_r || 0.25) * minDim * 0.5 * (1 + breathe);
  const limbLen = (form.limb_len || 0.3) * minDim * 0.45;

  ctx.save();
  ctx.translate(w / 2 + driftX, h / 2 + driftY);
  ctx.globalAlpha = opacity;

  // Glow aura
  if (glow > 0.04) {
    const gr = bodyR * (1.7 + glow * 1.3);
    const gg = ctx.createRadialGradient(0, 0, bodyR * 0.3, 0, 0, gr);
    gg.addColorStop(0, hexA(palette[0], glow * 0.5));
    gg.addColorStop(0.55, hexA(palette[0], glow * 0.15));
    gg.addColorStop(1, hexA(palette[0], 0));
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(0, 0, gr, 0, TAU); ctx.fill();
  }

  // Limbs behind body (except star — spikes are the star's own points)
  if (limbs > 0 && shape !== 'star') drawLimbs(ctx, bodyR, limbLen, limbs, symmetry, palette, reach, time);

  // Body
  switch (shape) {
    case 'blob':    drawBlob(ctx, bodyR, segments, palette, pattern, time); break;
    case 'star':    drawStar(ctx, bodyR, bodyR * 0.36, limbs || segments, palette, pattern, time); break;
    case 'ring': {
      // Ring: outer blob + cut out inner circle
      const tmp = document.createElement('canvas');
      tmp.width = w; tmp.height = h;
      const tc = tmp.getContext('2d');
      tc.translate(w/2 + driftX, h/2 + driftY);
      drawBlob(tc, bodyR, segments, palette, pattern, time);
      tc.globalCompositeOperation = 'destination-out';
      tc.beginPath(); tc.arc(0, 0, bodyR * 0.52, 0, TAU); tc.fill();
      ctx.drawImage(tmp, -w/2 - driftX, -h/2 - driftY);
      break;
    }
    case 'segment': drawSegmented(ctx, bodyR, segments, palette, pattern, time); break;
    default:        drawBlob(ctx, bodyR, segments, palette, pattern, time);
  }

  ctx.restore();
}

/* ── SHA-256 (native SubtleCrypto, runs in-page — no sandbox needed for data) ─ */
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}
async function genomeId(genome) {
  // Matches build.py: json.dumps(genome, sort_keys=True, separators=(',',':'))
  function canonical(v) {
    if (Array.isArray(v)) return '[' + v.map(canonical).join(',') + ']';
    if (v !== null && typeof v === 'object')
      return '{' + Object.keys(v).sort().map(k => JSON.stringify(k) + ':' + canonical(v[k])).join(',') + '}';
    return JSON.stringify(v);
  }
  return (await sha256hex(canonical(genome))).slice(0, 12);
}

/* ── Base64url helpers ────────────────────────────────────────────────────── */
function b64enc(s) { return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64dec(s) { s = String(s).replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; return decodeURIComponent(escape(atob(s))); }

/* ── Default cartridge (Lumina) ────────────────────────────────────────────── */
const DEFAULT_CART = {"schema":"hologram-cartridge/1.0","id":"d45a79d29e99","title":"Lumina","author":"@kody-w","born":{"coord":"0,0","from":"genesis"},"parent":"","genome":{"layers":[{"role":"form","k":30,"shape":"blob","limbs":0,"segments":8,"symmetry":"radial","body_r":0.3,"limb_len":0},{"role":"surface","k":85,"palette":["#00ccff","#0088ff","#ffffff","#aaddff"],"pattern":"glow","glow":0.8,"opacity":0.85},{"role":"motion","k":60,"breathe":0.2,"drift":0.5,"pulse":0.8,"reach":0}],"compose":{"windows":[[0,1,2]],"loop":true}},"sig":""};

/* ── State ────────────────────────────────────────────────────────────────── */
let CART = null, RAF = null, T0 = null;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const verEl = document.getElementById('verify');

async function loadCart(cart) {
  CART = cart;
  // Verify genome id
  const got = await genomeId(cart.genome);
  const declared = cart.id || '';
  verEl.style.display = 'block';
  if (!declared || got === declared) {
    verEl.textContent = got + ' ✓';
    verEl.className = 'mono';
  } else {
    verEl.textContent = got + ' ≠ ' + declared.slice(0,12) + ' (remix)';
    verEl.className = 'mono mismatch';
  }
  document.getElementById('i-title').textContent = cart.title || '';
  document.getElementById('i-author').textContent = cart.author || '';
  document.getElementById('i-id').textContent = 'id:' + (cart.id || got);
  document.getElementById('cart-json').value = JSON.stringify(cart, null, 2);
  startAnim();
}

function startAnim() {
  if (RAF) cancelAnimationFrame(RAF);
  T0 = null;
  function frame(ts) {
    if (!T0) T0 = ts;
    if (CART) renderFrame(ctx, CART.genome, (ts - T0) / 1000);
    RAF = requestAnimationFrame(frame);
  }
  RAF = requestAnimationFrame(frame);
}

/* ── Loader ───────────────────────────────────────────────────────────────── */
async function loadFromUrl(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`fetch ${url} → ${res.status}`);
  return await res.json();
}

async function resolveAndLoad(input) {
  input = (input || '').trim();
  if (!input) return;
  let cart;
  try {
    if (input.startsWith('{')) { cart = JSON.parse(input); }
    else {
      const u = new URL(input, location.href);
      cart = await loadFromUrl(u.href);
    }
    await loadCart(cart);
    document.getElementById('cart-json').value = JSON.stringify(cart, null, 2);
  } catch(e) {
    document.getElementById('i-title').textContent = '✗ ' + (e.message || e);
    document.getElementById('i-title').style.color = '#f85149';
  }
}

/* ── Boot ─────────────────────────────────────────────────────────────────── */
(async () => {
  const p = new URLSearchParams(location.search);
  const hash = (location.hash || '').slice(1);
  let cart = null;

  if (hash) {
    try { cart = JSON.parse(b64dec(hash)); } catch {}
  }
  if (!cart && p.has('cart')) {
    try { cart = await loadFromUrl(p.get('cart')); } catch(e) {
      document.getElementById('i-title').textContent = '✗ ' + (e.message || e);
    }
  }
  if (!cart && p.has('id')) {
    try {
      const reg = await (await fetch('registry.json', { cache: 'no-store' })).json();
      const entry = (reg.entries || []).find(e => e.name === p.get('id') || e.id === p.get('id'));
      if (entry) cart = await loadFromUrl(new URL(entry.pin_path, location.href).href);
    } catch {}
  }
  if (!cart) cart = DEFAULT_CART;

  await loadCart(cart);

  // Populate title bar
  try {
    const reg = await (await fetch('registry.json', { cache: 'no-store' })).json();
    document.getElementById('meta').textContent =
      `${reg.summary.cartridges} cartridges · <a href="registry.json">registry.json</a>`;
    document.getElementById('meta').innerHTML =
      `${reg.summary.cartridges} cartridges · <a href="registry.json">registry.json</a>`;
  } catch {}
})();

/* ── Controls ─────────────────────────────────────────────────────────────── */
document.getElementById('btn-load').onclick = () =>
  resolveAndLoad(document.getElementById('cart-url').value);
document.getElementById('cart-url').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-load').click(); });

document.getElementById('btn-apply').onclick = async () => {
  try {
    const cart = JSON.parse(document.getElementById('cart-json').value);
    await loadCart(cart);
  } catch(e) {
    document.getElementById('i-title').textContent = '✗ ' + e.message;
    document.getElementById('i-title').style.color = '#f85149';
  }
};

document.getElementById('btn-dl').onclick = () => {
  if (!CART) return;
  const blob = new Blob([JSON.stringify(CART, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: (CART.title || 'cartridge') + '.json' });
  a.click(); URL.revokeObjectURL(a.href);
};

document.getElementById('btn-link').onclick = async () => {
  if (!CART) return;
  const url = new URL('player.html#' + b64enc(JSON.stringify(CART)), location.href).href;
  await navigator.clipboard?.writeText(url);
  const btn = document.getElementById('btn-link');
  btn.textContent = 'copied ✓'; setTimeout(() => btn.textContent = 'copy link', 1400);
};

document.getElementById('btn-file').onclick = () => document.getElementById('file-in').click();
document.getElementById('file-in').onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  try { await loadCart(JSON.parse(await f.text())); } catch(err) {
    document.getElementById('i-title').textContent = '✗ ' + err.message;
  }
};

// Drag-and-drop
document.getElementById('canvas').addEventListener('dragover', e => e.preventDefault());
document.getElementById('canvas').addEventListener('drop', async e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if (!f) return;
  try { await loadCart(JSON.parse(await f.text())); } catch(err) {
    document.getElementById('i-title').textContent = '✗ ' + err.message;
  }
});

// QR
let qrMod = null;
document.getElementById('btn-qr').onclick = async () => {
  if (!CART) return;
  const wrap = document.getElementById('qr-wrap');
  if (wrap.style.display === 'block') { wrap.style.display = 'none'; return; }
  if (!qrMod) {
    try { qrMod = await import('../track/qr.mjs'); } catch {
      try { qrMod = await import('./qr.mjs'); } catch { alert('QR module unavailable'); return; }
    }
  }
  const url = new URL('player.html#' + b64enc(JSON.stringify(CART)), location.href).href;
  const { qr } = qrMod;
  const { size, modules } = qr(url, { ecl: 'M' });
  const q = 4, scale = Math.max(2, Math.floor(240 / (size + 2 * q))), dim = (size + 2 * q) * scale;
  const qc = document.getElementById('qr'); qc.width = dim; qc.height = dim;
  const qx = qc.getContext('2d');
  qx.fillStyle = '#fff'; qx.fillRect(0, 0, dim, dim);
  qx.fillStyle = '#000';
  for (let y = 0; y < size; y++) for (let x = 0; x < size; x++)
    if (modules[y][x]) qx.fillRect((x+q)*scale, (y+q)*scale, scale, scale);
  document.getElementById('qr-link').textContent = url;
  wrap.style.display = 'block';
};
</script></body></html>
