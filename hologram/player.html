<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hologram player</title>
<style>
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,system-ui,Segoe UI,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
 a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}
 .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px}
 #wrap{display:flex;flex-direction:column;align-items:center;padding:20px 16px;max-width:960px;margin:0 auto}
 #header{width:100%;display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
 #title{font-size:1.4rem;font-weight:800;margin:0}
 #meta{color:#8b949e;font-size:12px}
 #stage{position:relative;width:100%;max-width:480px}
 canvas{display:block;width:100%;border-radius:14px;background:#010409;border:1px solid #30363d}
 #canvas{cursor:grab;touch-action:none}
 #canvas.dragging{cursor:grabbing}
 #orbit-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;letter-spacing:.02em;color:#e6edf3;background:rgba(1,4,9,0.72);border:1px solid rgba(110,118,129,.45);padding:6px 10px;border-radius:999px;pointer-events:none;white-space:nowrap}
 #orbit-hint.hide{opacity:0}
 #verify{position:absolute;bottom:8px;right:10px;font-size:10px;font-family:ui-monospace,Menlo,monospace;color:#3fb950;background:rgba(1,4,9,0.75);padding:2px 7px;border-radius:20px;pointer-events:none}
 #verify.mismatch{color:#f0b429}
 #controls{width:100%;max-width:480px;margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
 button{font:inherit;font-size:12px;cursor:pointer;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:7px;padding:5px 12px}
 button:hover{background:#30363d}
 button.primary{background:#238636;border-color:#238636;color:#fff}
 button.primary:hover{filter:brightness(1.1)}
 #load-row{width:100%;max-width:480px;margin-top:10px;display:flex;gap:6px}
 #load-row input{flex:1;background:#010409;border:1px solid #30363d;border-radius:7px;color:#e6edf3;padding:5px 9px;font:inherit;font-size:12px}
 #info-row{width:100%;max-width:480px;margin-top:8px;font-size:11px;color:#8b949e;display:flex;gap:14px;flex-wrap:wrap}
 #json-area{width:100%;max-width:480px;margin-top:12px}
 #json-area textarea{width:100%;min-height:120px;background:#010409;border:1px solid #30363d;border-radius:8px;color:#e6edf3;padding:8px;font-family:ui-monospace,Menlo,monospace;font-size:11px;resize:vertical}
 #json-area .row{display:flex;gap:6px;margin-top:5px}
 #qr-wrap{margin-top:10px;width:100%;max-width:480px;text-align:center}
 canvas.qr{border-radius:8px;background:#fff;image-rendering:pixelated;display:inline-block}
 #qr-link{word-break:break-all;font-size:10.5px;color:#8b949e;margin-top:4px}
 .err{color:#f85149}
 @media(min-width:700px){
  #wrap{flex-direction:row;align-items:flex-start;gap:24px;flex-wrap:wrap}
  #header{grid-column:1/-1;width:100%}
  #stage,#controls,#load-row,#info-row,#json-area,#qr-wrap{max-width:340px}
 }
</style></head><body>
<div id="wrap">
 <div id="header">
  <h1 id="title">🌀 hologram</h1>
  <span id="meta" class="mono"></span>
 </div>

 <div id="stage">
  <canvas id="canvas" width="480" height="480"></canvas>
  <div id="orbit-hint">drag to look around</div>
  <div id="verify" style="display:none"></div>
 </div>

 <div style="display:flex;flex-direction:column;gap:0;flex:1;min-width:240px">
  <div id="controls">
   <button id="btn-dl">↓ download .json</button>
   <button id="btn-link">copy link</button>
   <button id="btn-qr">QR</button>
   <a href="index.html"><button>gallery →</button></a>
  </div>
  <div id="load-row">
   <input id="cart-url" placeholder="cartridge URL or paste JSON…">
   <button class="primary" id="btn-load">load</button>
  </div>
  <div id="info-row">
   <span id="i-title"></span>
   <span id="i-author"></span>
   <span id="i-id" class="mono"></span>
  </div>
  <div id="json-area">
   <textarea id="cart-json" spellcheck="false" placeholder="paste hologram-cartridge/1.0 JSON here…"></textarea>
   <div class="row">
    <button id="btn-apply">apply JSON</button>
    <input type="file" id="file-in" accept=".json" style="display:none">
    <button id="btn-file">open file…</button>
   </div>
  </div>
  <div id="qr-wrap" style="display:none">
   <canvas class="qr" id="qr"></canvas>
   <div id="qr-link" class="mono"></div>
  </div>
 </div>
</div>

<script type="module">
/* ── Software-3D renderer ─────────────────────────────────────────────────── */
const TAU = Math.PI * 2;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, t) => a + (b - a) * t;
const fract = v => v - Math.floor(v);

const V3 = {
  add: (a, b) => ({ x: a.x + b.x, y: a.y + b.y, z: a.z + b.z }),
  sub: (a, b) => ({ x: a.x - b.x, y: a.y - b.y, z: a.z - b.z }),
  scale: (a, s) => ({ x: a.x * s, y: a.y * s, z: a.z * s }),
  dot: (a, b) => a.x * b.x + a.y * b.y + a.z * b.z,
  cross: (a, b) => ({ x: a.y * b.z - a.z * b.y, y: a.z * b.x - a.x * b.z, z: a.x * b.y - a.y * b.x }),
  len: a => Math.hypot(a.x, a.y, a.z),
  norm(a) { const l = Math.hypot(a.x, a.y, a.z) || 1; return { x: a.x / l, y: a.y / l, z: a.z / l }; },
  mid: pts => V3.scale(pts.reduce((acc, p) => ({ x: acc.x + p.x, y: acc.y + p.y, z: acc.z + p.z }), { x: 0, y: 0, z: 0 }), 1 / Math.max(pts.length, 1))
};

function vec(x, y, z) { return { x, y, z }; }
function rotX(p, a) { const c = Math.cos(a), s = Math.sin(a); return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c }; }
function rotY(p, a) { const c = Math.cos(a), s = Math.sin(a); return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c }; }
function rotZ(p, a) { const c = Math.cos(a), s = Math.sin(a); return { x: p.x * c - p.y * s, y: p.x * s + p.y * c, z: p.z }; }
function transformPoint(p, tf) {
  let q = { x: p.x * tf.scale.x, y: p.y * tf.scale.y, z: p.z * tf.scale.z };
  q = rotX(q, tf.rot.x); q = rotY(q, tf.rot.y); q = rotZ(q, tf.rot.z);
  return V3.add(q, tf.pos);
}
function hexA(hex, a) {
  const c = parseHex(hex);
  return `rgba(${c.r},${c.g},${c.b},${a.toFixed(3)})`;
}
function parseHex(hex) {
  if (!hex || hex[0] !== '#') return { r: 68, g: 136, b: 255 };
  const s = hex.length === 4 ? '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3] : hex;
  return { r: parseInt(s.slice(1, 3), 16), g: parseInt(s.slice(3, 5), 16), b: parseInt(s.slice(5, 7), 16) };
}
function colorCss(c, a = 1) {
  return `rgba(${clamp(Math.round(c.r), 0, 255)},${clamp(Math.round(c.g), 0, 255)},${clamp(Math.round(c.b), 0, 255)},${clamp(a, 0, 1).toFixed(3)})`;
}
function mixColor(a, b, t) {
  return { r: lerp(a.r, b.r, t), g: lerp(a.g, b.g, t), b: lerp(a.b, b.b, t) };
}
function scaleColor(c, s) {
  return { r: clamp(c.r * s, 0, 255), g: clamp(c.g * s, 0, 255), b: clamp(c.b * s, 0, 255) };
}
function paletteSample(palette, t) {
  const list = (palette && palette.length ? palette : ['#4488ff', '#2255cc']).map(parseHex);
  if (list.length === 1) return list[0];
  const x = clamp(t, 0, 1) * (list.length - 1);
  const i = Math.floor(x), f = x - i;
  return mixColor(list[i], list[Math.min(i + 1, list.length - 1)], f);
}
function patternSample(pattern, palette, u, v, w, pulse, part = 'body') {
  const base = paletteSample(palette, fract(u * 0.35 + 0.5));
  const alt = paletteSample(palette, fract(v * 0.35 + 0.5));
  const hi = paletteSample(palette, fract(w * 0.35 + 0.5));
  if (part === 'eye') return { color: { r: 255, g: 244, b: 200 }, emissive: 1.15 };
  if (part === 'limb') {
    const t = 0.45 + 0.35 * Math.sin(u * 4.5 + v * 2.2);
    return { color: mixColor(base, alt, t), emissive: pattern === 'glow' ? 0.22 + pulse * 0.15 : 0.05 };
  }
  if (part === 'spike') return { color: mixColor(hi, { r: 255, g: 255, b: 255 }, 0.08 + pulse * 0.08), emissive: 0.15 + (pattern === 'glow' ? 0.25 + pulse * 0.2 : 0) };
  switch (pattern) {
    case 'stripe': {
      const band = 0.5 + 0.5 * Math.sin(u * 8 + v * 3);
      return { color: mixColor(base, alt, band), emissive: 0.08 };
    }
    case 'spot': {
      const n = Math.sin(u * 8.1 + v * 6.2 + w * 5.7);
      return { color: n > 0.45 ? mixColor(hi, { r: 255, g: 255, b: 255 }, 0.18) : base, emissive: n > 0.7 ? 0.18 : 0.06 };
    }
    case 'glow':
      return { color: mixColor(base, { r: 255, g: 255, b: 255 }, 0.15 + 0.15 * pulse), emissive: 0.34 + pulse * 0.34 };

      return { color: mixColor(base, hi, 0.15), emissive: 0.04 };
  }
}
function pushFace(faces, pts, fill, alpha) { faces.push({ pts, fill, alpha }); }
function pushQuad(faces, a, b, c, d, fill, alpha) {
  pushFace(faces, [a, b, c], fill, alpha);
  pushFace(faces, [a, c, d], fill, alpha);
}
function addBox(faces, center, sx, sy, sz, fill, alpha = 1, tf = null) {
  const hx = sx / 2, hy = sy / 2, hz = sz / 2;
  let pts = [vec(-hx, -hy, -hz), vec(hx, -hy, -hz), vec(hx, hy, -hz), vec(-hx, hy, -hz), vec(-hx, -hy, hz), vec(hx, -hy, hz), vec(hx, hy, hz), vec(-hx, hy, hz)].map(p => V3.add(p, center));
  if (tf) pts = pts.map(p => transformPoint(p, tf));
  [[0, 1, 2, 3], [4, 7, 6, 5], [0, 4, 5, 1], [1, 5, 6, 2], [2, 6, 7, 3], [4, 0, 3, 7]].forEach(q => pushQuad(faces, pts[q[0]], pts[q[1]], pts[q[2]], pts[q[3]], fill, alpha));
}
function addSphere(faces, center, rx, ry, rz, latSteps, lonSteps, fillFn, alpha = 1, tf = null) {
  const latN = Math.max(4, latSteps), lonN = Math.max(6, lonSteps);
  const P = (la, lo) => {
    const a = -Math.PI / 2 + la * Math.PI, b = lo * TAU;
    const c = Math.cos(a);
    return { p: vec(center.x + Math.cos(b) * c * rx, center.y + Math.sin(a) * ry, center.z + Math.sin(b) * c * rz), u: Math.cos(b) * c, v: Math.sin(a), w: Math.sin(b) * c };
  };
  for (let i = 0; i < latN; i++) {
    for (let j = 0; j < lonN; j++) {
      const p00 = P(i / latN, j / lonN), p01 = P(i / latN, (j + 1) / lonN), p10 = P((i + 1) / latN, j / lonN), p11 = P((i + 1) / latN, (j + 1) / lonN);
      const pts = [p00.p, p01.p, p11.p, p10.p].map(p => tf ? transformPoint(p, tf) : p);
      const fill = fillFn((p00.u + p01.u + p10.u + p11.u) / 4, (p00.v + p01.v + p10.v + p11.v) / 4, (p00.w + p01.w + p10.w + p11.w) / 4);
      pushQuad(faces, pts[0], pts[1], pts[2], pts[3], fill, alpha);
    }
  }
}
function addStarBody(faces, center, size, latSteps, lonSteps, spikes, fillFn, alpha = 1, tf = null) {
  const latN = Math.max(5, latSteps), lonN = Math.max(7, lonSteps), freq = Math.max(4, spikes);
  const P = (la, lo) => {
    const a = -Math.PI / 2 + la * Math.PI, b = lo * TAU, c = Math.cos(a);
    const spike = 1 + 0.28 * Math.max(0, Math.sin(b * freq) * Math.pow(c, 0.65)) + 0.1 * Math.sin((a + Math.PI / 2) * Math.max(3, Math.round(freq / 2)));
    return { p: vec(center.x + Math.cos(b) * c * size * 0.85 * spike, center.y + Math.sin(a) * size * 0.72 * (1 + 0.08 * Math.cos(b * freq * 0.5)), center.z + Math.sin(b) * c * size * 0.85 * spike), u: Math.cos(b) * c * spike, v: Math.sin(a), w: Math.sin(b) * c * spike };
  };
  for (let i = 0; i < latN; i++) {
    for (let j = 0; j < lonN; j++) {
      const p00 = P(i / latN, j / lonN), p01 = P(i / latN, (j + 1) / lonN), p10 = P((i + 1) / latN, j / lonN), p11 = P((i + 1) / latN, (j + 1) / lonN);
      const pts = [p00.p, p01.p, p11.p, p10.p].map(p => tf ? transformPoint(p, tf) : p);
      const fill = fillFn((p00.u + p01.u + p10.u + p11.u) / 4, (p00.v + p01.v + p10.v + p11.v) / 4, (p00.w + p01.w + p10.w + p11.w) / 4);
      pushQuad(faces, pts[0], pts[1], pts[2], pts[3], fill, alpha);
    }
  }
}
function addTorus(faces, center, majorR, minorR, segU, segV, fillFn, alpha = 1, tf = null) {
  const su = Math.max(8, segU), sv = Math.max(6, segV);
  const P = (u, v) => {
    const a = u * TAU, b = v * TAU, ring = majorR + Math.cos(b) * minorR;
    return { p: vec(center.x + Math.cos(a) * ring, center.y + Math.sin(b) * minorR, center.z + Math.sin(a) * ring), u: Math.cos(a), v: Math.sin(b), w: Math.sin(a) };
  };
  for (let i = 0; i < su; i++) {
    for (let j = 0; j < sv; j++) {
      const p00 = P(i / su, j / sv), p01 = P(i / su, (j + 1) / sv), p10 = P((i + 1) / su, j / sv), p11 = P((i + 1) / su, (j + 1) / sv);
      const pts = [p00.p, p10.p, p11.p, p01.p].map(p => tf ? transformPoint(p, tf) : p);
      const fill = fillFn((p00.u + p01.u + p10.u + p11.u) / 4, (p00.v + p01.v + p10.v + p11.v) / 4, (p00.w + p01.w + p10.w + p11.w) / 4);
      pushQuad(faces, pts[0], pts[1], pts[2], pts[3], fill, alpha);
    }
  }
}
function addCylinder(faces, from, to, r0, r1, steps, fillFn, alpha = 1, cap0 = true, cap1 = false) {
  const axis = V3.norm(V3.sub(to, from));
  const ref = Math.abs(axis.y) < 0.92 ? vec(0, 1, 0) : vec(1, 0, 0);
  const side = V3.norm(V3.cross(ref, axis));
  const up = V3.norm(V3.cross(axis, side));
  const rings0 = [], rings1 = [], n = Math.max(5, steps);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU, c = Math.cos(a), s = Math.sin(a);
    const off = V3.add(V3.scale(side, c), V3.scale(up, s));
    rings0.push(V3.add(from, V3.scale(off, r0)));
    rings1.push(V3.add(to, V3.scale(off, r1)));
  }
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const fill = fillFn(i / n, 0, j / n);
    pushQuad(faces, rings0[i], rings0[j], rings1[j], rings1[i], fill, alpha);
    if (cap0 && r0 > 0.001) pushFace(faces, [from, rings0[j], rings0[i]], fill, alpha);
    if (cap1 && r1 > 0.001) pushFace(faces, [to, rings1[i], rings1[j]], fill, alpha);
  }
}
function bodyTransform(spec, time) {
  const drift = spec.motion.drift || 0;
  const sway = drift * 0.18 * Math.sin(time * 0.55);
  return {
    pos: vec(0, drift * 0.12 * Math.cos(time * 0.6), 0),
    rot: vec(drift * 0.06 * Math.sin(time * 0.5), spec.motion.reach * 0.14 * Math.sin(time * 0.45), sway),
    scale: vec(1, 1, 1)
  };
}
function readGenome(genome, time) {
  const layers = genome.layers || [], compose = genome.compose || {}, windows = compose.windows || [];
  const winIdx = windows.length > 1 && compose.loop ? Math.floor(time / 1.8) % windows.length : 0;
  const active = new Set(windows[winIdx] || []);
  const byRole = {};
  layers.forEach((l, i) => { if (!byRole[l.role] || active.has(i)) byRole[l.role] = l; });
  const form = byRole.form || {};
  const surface = byRole.surface || {};
  const motion = byRole.motion || {};
  const breathe = (motion.breathe || 0) * Math.sin(time * TAU * 0.65);
  const pulseAmt = motion.pulse || 0;
  const pulse = pulseAmt * (0.5 + 0.5 * Math.sin(time * TAU * Math.max(pulseAmt, 0.2) * 1.3));
  const size = 1.1 + (form.body_r || 0.25) * 2.7;
  return {
    form,
    surface: { palette: surface.palette || ['#4488ff', '#2255cc'], pattern: surface.pattern || 'solid', glow: surface.glow || 0, opacity: surface.opacity == null ? 1 : surface.opacity },
    motion,
    size: size * (1 + breathe * 0.18),
    limbLen: 0.5 + (form.limb_len || 0.3) * 2.6,
    segments: clamp(Math.round(form.segments || 6), 3, 14),
    limbs: clamp(Math.round(form.limbs || 0), 0, 14),
    pulse,
    breathe
  };
}
function buildCreatureFaces(spec, time) {
  const faces = [];
  const { form, surface, motion, size, limbLen, limbs, segments, pulse } = spec;
  const shape = form.shape || 'blob';
  const symmetry = form.symmetry || 'radial';
  const tf = bodyTransform(spec, time);
  const bodyY = limbs > 0 ? Math.max(0.45, limbLen * 0.42) : 0.28;
  const bodyFill = (u, v, w) => patternSample(surface.pattern, surface.palette, u, v, w, pulse, 'body');
  const limbFill = (u, v, w) => patternSample(surface.pattern, surface.palette, u + 0.2, v, w, pulse, 'limb');
  const spikeFill = (u, v, w) => patternSample(surface.pattern, surface.palette, u, v, w, pulse, 'spike');
  const headFill = (u, v, w) => patternSample(surface.pattern, surface.palette, u + 0.1, v + 0.15, w, pulse, 'body');

  if (limbs > 0) {
    if (symmetry === 'radial') {
      for (let i = 0; i < limbs; i++) {
        const ang = (i / limbs) * TAU;
        const wag = (motion.reach || 0) * 0.34 * Math.sin(time * 2.4 + i * 1.1);
        const anchor = vec(Math.cos(ang) * size * 0.52, bodyY - size * 0.16, Math.sin(ang) * size * 0.44);
        const foot = vec(Math.cos(ang + wag) * (size * 0.68 + limbLen * 0.28), bodyY - (limbLen + size * 0.5), Math.sin(ang + wag) * (size * 0.56 + limbLen * 0.28));

      }
    } else {
      const pairs = Math.max(1, Math.ceil(limbs / 2));
      for (let i = 0; i < pairs; i++) {
        const x = pairs === 1 ? 0 : lerp(-size * 0.45, size * 0.38, i / (pairs - 1));
        const wag = (motion.reach || 0) * 0.28 * Math.sin(time * 2.6 + i * 1.3);
        for (const side of [-1, 1]) {
          const anchor = vec(x, bodyY - size * 0.18, side * size * 0.34);
          const foot = vec(x + wag * size * 0.55, bodyY - (limbLen + size * 0.48), side * (size * 0.54 + limbLen * 0.22));
          addCylinder(faces, transformPoint(anchor, tf), transformPoint(foot, tf), size * 0.08, size * 0.04, 8, limbFill, surface.opacity, false, false);
        }
      }
      if (limbs % 2 === 1) {
        const tailA = vec(-size * 0.7, bodyY - size * 0.05, 0);
        const tailB = vec(-size * 1.1, bodyY + size * 0.08 + (motion.reach || 0) * 0.25 * Math.sin(time * 2.1), 0);
        addCylinder(faces, transformPoint(tailA, tf), transformPoint(tailB, tf), size * 0.06, size * 0.015, 7, limbFill, surface.opacity, false, false);
      }

  else if (shape === 'ring') addTorus(faces, vec(0, bodyY, 0), size * 0.7, size * 0.24, segments * 2 + 4, Math.max(8, segments + 3), bodyFill, surface.opacity, tf);
  else {
    const segN = Math.max(3, segments);
    for (let i = 0; i < segN; i++) {
      const frac = segN === 1 ? 0.5 : i / (segN - 1);
      const x = lerp(-size * 0.62, size * 0.62, frac);
      const s = 0.58 + 0.42 * Math.sin(frac * Math.PI);
      addSphere(faces, vec(x, bodyY, 0), size * 0.34 * s, size * 0.28 * s, size * 0.32 * s, 7, 10, (u, v, w) => bodyFill(u + frac * 0.8, v, w), surface.opacity, tf);
    }
  }

  const spikeCount = shape === 'star' ? Math.max(0, Math.round(segments / 2)) : Math.max(1, Math.min(10, segments - 1));
  if (spikeCount > 0 && shape !== 'ring') {
    for (let i = 0; i < spikeCount; i++) {
      const frac = spikeCount === 1 ? 0.5 : i / (spikeCount - 1);
      const base = vec(lerp(-size * 0.42, size * 0.35, frac), bodyY + size * (shape === 'segment' ? 0.18 : 0.4), 0);
      const tip = vec(base.x, base.y + size * (0.24 + 0.05 * Math.sin(frac * Math.PI)), 0);
      addCylinder(faces, transformPoint(base, tf), transformPoint(tip, tf), size * 0.08, 0.001, 6, spikeFill, surface.opacity, true, false);
    }
  }

  const headPos = vec(shape === 'ring' ? size * 1.0 : size * 0.98, bodyY + size * 0.12, 0);
  addBox(faces, transformPoint(headPos, tf), size * 0.56, size * 0.44, size * 0.42, headFill(0.8, 0.5, 0.5), surface.opacity);
  addSphere(faces, transformPoint(vec(headPos.x + size * 0.33, headPos.y + size * 0.06, size * 0.11), tf), size * 0.08, size * 0.08, size * 0.08, 5, 8, () => patternSample(surface.pattern, surface.palette, 0.5, 0.5, 0.5, pulse, 'eye'), Math.min(1, surface.opacity + 0.12));
  addSphere(faces, transformPoint(vec(headPos.x + size * 0.33, headPos.y + size * 0.06, -size * 0.11), tf), size * 0.08, size * 0.08, size * 0.08, 5, 8, () => patternSample(surface.pattern, surface.palette, 0.5, 0.5, 0.5, pulse, 'eye'), Math.min(1, surface.opacity + 0.12));

  return { faces, bodyY, floorY: bodyY - (limbLen + size * 0.72), haloY: bodyY, size };
}
function makeCamera(target, yaw, pitch, radius) {
  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  const pos = { x: target.x + Math.cos(yaw) * cp * radius, y: target.y + sp * radius, z: target.z + Math.sin(yaw) * cp * radius };
  const forward = V3.norm(V3.sub(target, pos));
  const right = V3.norm(V3.cross(forward, vec(0, 1, 0)));
  const up = V3.norm(V3.cross(right, forward));
  return { pos, forward, right, up };
}
function projectPoint(p, camera, w, h, focal) {
  const rel = V3.sub(p, camera.pos);
  const x = V3.dot(rel, camera.right), y = V3.dot(rel, camera.up), z = V3.dot(rel, camera.forward);
  if (z <= 0.08) return null;
  const s = focal / z;
  return { x: w / 2 + x * s, y: h / 2 - y * s, z };
}
function drawShadow(ctx, camera, w, h, focal, floorY, size) {
  const pts = [];
  for (let i = 0; i < 28; i++) {
    const a = (i / 28) * TAU;
    const p = projectPoint(vec(Math.cos(a) * size * 0.95, floorY, Math.sin(a) * size * 0.72), camera, w, h, focal);
    if (p) pts.push(p);
  }
  if (pts.length < 8) return;
  ctx.beginPath();
  pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.fill();
}
function drawHalo(ctx, camera, w, h, focal, center, size, surface, pulse) {
  if ((surface.glow || 0) <= 0.03) return;
  const cp = projectPoint(center, camera, w, h, focal);
  if (!cp) return;
  const edge = projectPoint(V3.add(center, vec(size * 1.15, 0, 0)), camera, w, h, focal);
  if (!edge) return;
  const rr = Math.max(20, Math.hypot(edge.x - cp.x, edge.y - cp.y) * (1.2 + surface.glow * 0.7));
  const g = ctx.createRadialGradient(cp.x, cp.y, rr * 0.18, cp.x, cp.y, rr);
  g.addColorStop(0, hexA(surface.palette[0], surface.glow * (0.22 + pulse * 0.28)));
  g.addColorStop(0.55, hexA(surface.palette[0], surface.glow * 0.1));
  g.addColorStop(1, hexA(surface.palette[0], 0));
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cp.x, cp.y, rr, 0, TAU);
  ctx.fill();
}
function renderScene(ctx, genome, time, view) {
  const w = ctx.canvas.width, h = ctx.canvas.height;
  ctx.clearRect(0, 0, w, h);
  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#07111b'); bg.addColorStop(0.55, '#04080f'); bg.addColorStop(1, '#010409');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

  const spec = readGenome(genome, time);
  const built = buildCreatureFaces(spec, time);
  const yaw = view.yaw + (view.autoOrbit || 0);
  const pitch = clamp(view.pitch, -0.85, 0.92);
  const radius = (3.5 + built.size * 1.12) / clamp(view.zoom, 0.72, 1.9);
  const target = vec(0, built.haloY * 0.72, 0);
  const camera = makeCamera(target, yaw, pitch, radius);
  const focal = Math.min(w, h) * 0.96;
  drawHalo(ctx, camera, w, h, focal, vec(0, built.haloY, 0), built.size, spec.surface, spec.pulse);
  drawShadow(ctx, camera, w, h, focal, built.floorY, built.size);

  const lightDir = V3.norm(vec(0.45, 0.9, 0.65));
  const polys = [];
  for (const face of built.faces) {
    const proj = face.pts.map(p => projectPoint(p, camera, w, h, focal));
    if (proj.some(p => !p)) continue;
    const a = face.pts[0], b = face.pts[1], c = face.pts[2];
    const normal = V3.norm(V3.cross(V3.sub(b, a), V3.sub(c, a)));
    const center = V3.mid(face.pts);
    const diffuse = Math.max(0, V3.dot(normal, lightDir));
    const viewDot = Math.max(0, V3.dot(normal, V3.norm(V3.sub(camera.pos, center))));
    const lit = 0.26 + diffuse * 0.76 + viewDot * 0.12 + (face.fill.emissive || 0) * 0.35;
    polys.push({ proj, depth: proj.reduce((acc, p) => acc + p.z, 0) / proj.length, fill: colorCss(scaleColor(face.fill.color, lit), face.alpha) });
  }
  polys.sort((a, b) => b.depth - a.depth);
  for (const poly of polys) {
    ctx.beginPath();
    poly.proj.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    ctx.closePath();
    ctx.fillStyle = poly.fill;
    ctx.fill();
  }
}
/* ── SHA-256 (native SubtleCrypto, runs in-page — no sandbox needed for data) ─ */
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}
async function genomeId(genome) {
  // Matches build.py: json.dumps(genome, sort_keys=True, separators=(',',':'))
  function canonical(v) {
    if (Array.isArray(v)) return '[' + v.map(canonical).join(',') + ']';
    if (v !== null && typeof v === 'object')
      return '{' + Object.keys(v).sort().map(k => JSON.stringify(k) + ':' + canonical(v[k])).join(',') + '}';
    return JSON.stringify(v);
  }
  return (await sha256hex(canonical(genome))).slice(0, 12);
}

/* ── Base64url helpers ────────────────────────────────────────────────────── */
function b64enc(s) { return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64dec(s) { s = String(s).replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; return decodeURIComponent(escape(atob(s))); }

/* ── Default cartridge (Lumina) ────────────────────────────────────────────── */
const DEFAULT_CART = {"schema":"hologram-cartridge/1.0","id":"d45a79d29e99","title":"Lumina","author":"@kody-w","born":{"coord":"0,0","from":"genesis"},"parents":[],"genome":{"layers":[{"role":"form","k":30,"shape":"blob","limbs":0,"segments":8,"symmetry":"radial","body_r":0.3,"limb_len":0},{"role":"surface","k":85,"palette":["#00ccff","#0088ff","#ffffff","#aaddff"],"pattern":"glow","glow":0.8,"opacity":0.85},{"role":"motion","k":60,"breathe":0.2,"drift":0.5,"pulse":0.8,"reach":0}],"compose":{"windows":[[0,1,2]],"loop":true}},"sig":""};

/* ── State ────────────────────────────────────────────────────────────────── */
let CART = null, RAF = null, T0 = null, _pmPort = null;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const verEl = document.getElementById('verify');
const orbitHintEl = document.getElementById('orbit-hint');
const VIEW = { yaw: 0.85, pitch: 0.22, zoom: 1.0, dragging: false, autoOrbit: 0, userMoved: false, lastTs: null, pinch: 0 };

async function loadCart(cart) {
  CART = cart;
  // Verify genome id
  const got = await genomeId(cart.genome);
  const declared = cart.id || '';
  const match = !declared || got === declared;
  verEl.style.display = 'block';
  if (match) {
    verEl.textContent = got + ' ✓';
    verEl.className = 'mono';
  } else {
    verEl.textContent = got + ' ≠ ' + declared.slice(0,12) + ' (remix)';
    verEl.className = 'mono mismatch';
  }
  document.getElementById('i-title').textContent = cart.title || '';
  document.getElementById('i-author').textContent = cart.author || '';
  document.getElementById('i-id').textContent = 'id:' + (cart.id || got);
  document.getElementById('cart-json').value = JSON.stringify(cart, null, 2);
  startAnim();
  // Notify sandboxed housing if present
  if (_pmPort) {
    if (match) _pmPort.postMessage({ type: 'hatched', id: got });
    else _pmPort.postMessage({ type: 'hash-mismatch', got, declared });
  }
}

function startAnim() {
  if (RAF) cancelAnimationFrame(RAF);
  T0 = null;
  VIEW.lastTs = null;
  function frame(ts) {
    if (!T0) T0 = ts;
    const time = (ts - T0) / 1000;
    const dt = VIEW.lastTs == null ? 0 : (ts - VIEW.lastTs) / 1000;
    VIEW.lastTs = ts;
    if (!VIEW.dragging) VIEW.autoOrbit += dt * 0.32;
    if (CART) renderScene(ctx, CART.genome, time, VIEW);
    RAF = requestAnimationFrame(frame);
  }
  RAF = requestAnimationFrame(frame);
}

/* ── Loader ───────────────────────────────────────────────────────────────── */
async function loadFromUrl(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`fetch ${url} → ${res.status}`);
  return await res.json();
}

async function resolveAndLoad(input) {
  input = (input || '').trim();
  if (!input) return;
  let cart;
  try {
    if (input.startsWith('{')) { cart = JSON.parse(input); }
    else {
      const u = new URL(input, location.href);
      cart = await loadFromUrl(u.href);
    }
    await loadCart(cart);
    document.getElementById('cart-json').value = JSON.stringify(cart, null, 2);
  } catch(e) {
    document.getElementById('i-title').textContent = '✗ ' + (e.message || e);
    document.getElementById('i-title').style.color = '#f85149';
  }
}

/* ── Boot ─────────────────────────────────────────────────────────────────── */
(async () => {
  const p = new URLSearchParams(location.search);
  const hash = (location.hash || '').slice(1);
  let cart = null;

  if (hash) {
    try { cart = JSON.parse(b64dec(hash)); } catch {}
  }
  if (!cart && p.has('cart')) {
    try { cart = await loadFromUrl(p.get('cart')); } catch(e) {
      document.getElementById('i-title').textContent = '✗ ' + (e.message || e);
    }
  }
  if (!cart && p.has('id')) {
    try {
      const reg = await (await fetch('registry.json', { cache: 'no-store' })).json();
      const entry = (reg.entries || []).find(e => e.name === p.get('id') || e.id === p.get('id'));
      if (entry) cart = await loadFromUrl(new URL(entry.pin_path, location.href).href);
    } catch {}
  }
  if (!cart) cart = DEFAULT_CART;

  await loadCart(cart);

  // Populate title bar
  try {
    const reg = await (await fetch('registry.json', { cache: 'no-store' })).json();
    document.getElementById('meta').textContent =
      `${reg.summary.cartridges} cartridges · <a href="registry.json">registry.json</a>`;
    document.getElementById('meta').innerHTML =
      `${reg.summary.cartridges} cartridges · <a href="registry.json">registry.json</a>`;
  } catch {}
})();

/* ── Controls ─────────────────────────────────────────────────────────────── */
document.getElementById('btn-load').onclick = () =>
  resolveAndLoad(document.getElementById('cart-url').value);
document.getElementById('cart-url').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-load').click(); });

document.getElementById('btn-apply').onclick = async () => {
  try {
    const cart = JSON.parse(document.getElementById('cart-json').value);
    await loadCart(cart);
  } catch(e) {
    document.getElementById('i-title').textContent = '✗ ' + e.message;
    document.getElementById('i-title').style.color = '#f85149';
  }
};

document.getElementById('btn-dl').onclick = () => {
  if (!CART) return;
  const blob = new Blob([JSON.stringify(CART, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: (CART.title || 'cartridge') + '.json' });
  a.click(); URL.revokeObjectURL(a.href);
};

document.getElementById('btn-link').onclick = async () => {
  if (!CART) return;
  const url = new URL('player.html#' + b64enc(JSON.stringify(CART)), location.href).href;
  await navigator.clipboard?.writeText(url);
  const btn = document.getElementById('btn-link');
  btn.textContent = 'copied ✓'; setTimeout(() => btn.textContent = 'copy link', 1400);
};

document.getElementById('btn-file').onclick = () => document.getElementById('file-in').click();
document.getElementById('file-in').onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  try { await loadCart(JSON.parse(await f.text())); } catch(err) {
    document.getElementById('i-title').textContent = '✗ ' + err.message;
  }
};

function markOrbitInteraction() {
  VIEW.userMoved = true;
  orbitHintEl.classList.add('hide');
}
function orbitDown(x, y) {
  VIEW.dragging = true;
  VIEW.lastX = x;
  VIEW.lastY = y;
  canvas.classList.add('dragging');
  markOrbitInteraction();
}
function orbitMove(x, y) {
  if (!VIEW.dragging) return;
  const dx = x - VIEW.lastX, dy = y - VIEW.lastY;
  VIEW.lastX = x; VIEW.lastY = y;
  VIEW.yaw -= dx * 0.0105;
  VIEW.pitch = clamp(VIEW.pitch + dy * 0.0075, -0.85, 0.92);
}
function orbitUp() {
  VIEW.dragging = false;
  canvas.classList.remove('dragging');
  VIEW.pinch = 0;
}
function orbitZoom(delta) {
  VIEW.zoom = clamp(VIEW.zoom * Math.exp(-delta * 0.0014), 0.72, 1.9);
  markOrbitInteraction();
}
canvas.addEventListener('mousedown', e => orbitDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => orbitMove(e.clientX, e.clientY));
window.addEventListener('mouseup', orbitUp);
canvas.addEventListener('mouseleave', () => { if (VIEW.dragging) orbitUp(); else canvas.classList.remove('dragging'); });
canvas.addEventListener('wheel', e => { e.preventDefault(); orbitZoom(e.deltaY); }, { passive: false });
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) orbitDown(e.touches[0].clientX, e.touches[0].clientY);
  else if (e.touches.length === 2) {
    VIEW.pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    markOrbitInteraction();
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1) orbitMove(e.touches[0].clientX, e.touches[0].clientY);
  else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (VIEW.pinch) orbitZoom((VIEW.pinch - d) * 1.15);
    VIEW.pinch = d;
  }
}, { passive: true });
canvas.addEventListener('touchend', orbitUp);
canvas.addEventListener('touchcancel', orbitUp);

// Drag-and-drop
canvas.addEventListener('dragover', e => e.preventDefault());
document.getElementById('canvas').addEventListener('drop', async e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if (!f) return;
  try { await loadCart(JSON.parse(await f.text())); } catch(err) {
    document.getElementById('i-title').textContent = '✗ ' + err.message;
  }
});

// QR
let qrMod = null;
document.getElementById('btn-qr').onclick = async () => {
  if (!CART) return;
  const wrap = document.getElementById('qr-wrap');
  if (wrap.style.display === 'block') { wrap.style.display = 'none'; return; }
  if (!qrMod) {
    try { qrMod = await import('../track/qr.mjs'); } catch {
      try { qrMod = await import('./qr.mjs'); } catch { alert('QR module unavailable'); return; }
    }
  }
  const url = new URL('player.html#' + b64enc(JSON.stringify(CART)), location.href).href;
  const { qr } = qrMod;
  const { size, modules } = qr(url, { ecl: 'M' });
  const q = 4, scale = Math.max(2, Math.floor(240 / (size + 2 * q))), dim = (size + 2 * q) * scale;
  const qc = document.getElementById('qr'); qc.width = dim; qc.height = dim;
  const qx = qc.getContext('2d');
  qx.fillStyle = '#fff'; qx.fillRect(0, 0, dim, dim);
  qx.fillStyle = '#000';
  for (let y = 0; y < size; y++) for (let x = 0; x < size; x++)
    if (modules[y][x]) qx.fillRect((x+q)*scale, (y+q)*scale, scale, scale);
  document.getElementById('qr-link').textContent = url;
  wrap.style.display = 'block';
};

/* ── postMessage housing protocol ────────────────────────────────────────── */
// Accepts {type:'hologram-init'} from a host page that embeds this player in a
// sandboxed iframe (sandbox="allow-scripts"). Replies {type:'ready'} on the
// MessageChannel port, then accepts {type:'load-cartridge', cart:{...}} and
// replies {type:'hatched', id} or {type:'hash-mismatch', got, declared}.
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'hologram-init') return;
  _pmPort = e.ports[0] || null;
  if (!_pmPort) return;
  _pmPort.onmessage = async ev => {
    const d = ev.data;
    if (d && d.type === 'load-cartridge' && d.cart) await loadCart(d.cart);
  };
  _pmPort.postMessage({ type: 'ready' });
});
