<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>hologram player</title>
<style>

  let temp = '', wmo = '', wind = '', tod = '';
  const { moonPct, moonName, tide } = isMoon ? parseMoonOrigin(from) : { moonPct: null, moonName: '', tide: '' };
  if (isWeather) {
    const parts = from.split(' · ');
    for (const p of parts) {
      if (p.startsWith('live ')) { temp = p.replace(/^live\s+/, '').replace('°C', '°'); }
      else if (p.startsWith('code ')) { const n = parseInt(p.slice(5)); const w = wmoWord(n); wmo = w !== null ? w : p; }
      else if (p.startsWith('wind ')) { const n = parseInt(p.slice(5)); wind = windWord(n); }
      else if (p === 'day' || p === 'night') { tod = p; }
    }
  }
  let lat = null, epochTs = null;
  if (coord && !coord.startsWith('cross:') && coord !== '0,0') {
    const em = String(coord).match(/·(\d{10,})/);
    if (em) epochTs = parseInt(em[1]);
    const gh = String(coord).split('·')[0];
    if (gh && gh.length > 1) { try { lat = geohashDecode(gh).lat; } catch {} }
  }
  let seasonStr = null;
  if (lat !== null && epochTs) seasonStr = season(new Date(epochTs).getMonth(), lat);
  const bits = [];
  if (isMoon) {
    if (moonName) bits.push(moonName);
    if (moonPct !== null) bits.push(moonPct + '%');
    if (tide) bits.push(tide);
  } else {
    if (wmo) { const sw = seasonStr ? wmo + ' ' + seasonStr : wmo; bits.push('a ' + sw + (tod ? ' ' + tod : '')); }
    if (temp) bits.push(temp);
    if (wind && wind !== 'calm') bits.push(wind);
  }
  if (lat !== null) bits.push(latBand(lat));
  const dateStr = bornDate(coord);
  if (dateStr) bits.push(dateStr);
  return bits.length ? bits.join(' · ') : null;
}
function buildWhyLegend(cart) {
  const from = (cart.born && cart.born.from) || '';
  const coord = (cart.born && cart.born.coord) || '';
  const genome = cart.genome;
  const layers = (genome && genome.layers) || [];
  const byRole = {};
  for (const l of layers) byRole[l.role] = l;
  const surface = byRole.surface || {};
  const form = byRole.form || {};
  const motion = byRole.motion || {};
  // Non-weather origins
  if (!from.startsWith('live ')) {
    if (from === 'genesis' || !from) return [['origin', 'a genesis creature']];
    if (from.startsWith('a cross of ')) return [['lineage', from]];
    if (coord.startsWith('cross:')) return [['lineage', 'a cross']];
    if (from.startsWith('moon ') || from.startsWith('the moon')) {
      const { moonPct, moonName, tide } = parseMoonOrigin(from);
      const rows = [];
      if (moonPct !== null) rows.push(['its glow', 'the moon (' + moonPct + '%, ' + (moonName || 'phase') + ')']);
      if (moonPct !== null) rows.push(['its palette', moonPct > 70 ? 'bright moonlight' : moonPct > 40 ? 'half-lit sky' : 'dark new moon']);
      if (tide) rows.push(['its motion', tide]);
      return rows.length ? rows : [['origin', from]];
    }
    return [['origin', from || 'unknown']];
  }
  // Parse live weather tokens
  const parts = from.split(' \u00b7 ');
  let tempC = null, wmoCode = null, windKmh = null, tod = null;
  for (const p of parts) {
    if (p.startsWith('live ')) { const n = parseFloat(p.slice(5)); if (!isNaN(n)) tempC = n; }
    else if (p.startsWith('code ')) { const n = parseInt(p.slice(5)); if (!isNaN(n)) wmoCode = n; }
    else if (p.startsWith('wind ')) { const n = parseInt(p.slice(5)); if (!isNaN(n)) windKmh = n; }
    else if (p === 'day' || p === 'night') tod = p;
  }
  const rows = [];
  if (tempC !== null) {
    const feat = tempC >= 22 ? 'its warm tones' : tempC <= 8 ? 'its cool tones' : 'its palette';
    rows.push([feat, tempC + '\u00b0']);
  }
  if (wmoCode !== null) {
    const sky = wmoWord(wmoCode);
    if (sky) {
      const glowVal = surface.glow || 0;
      const feat = glowVal > 0.3 ? 'its glow' : wmoCode === 0 ? 'its sheen' : 'its texture';
      rows.push([feat, sky + (tod ? ' ' + tod : '')]);
    }
  }
  if (windKmh !== null) {
    const w = windWord(windKmh);
    const segments = form.segments || 0;
    const drift = motion.drift || 0;
    let feat;
    if (segments >= 6) feat = 'its spikes';
    else if (drift > 0.3) feat = 'its drift';
    else feat = 'its form';
    rows.push([feat, 'the wind (' + w + ', ' + windKmh + ' km/h)']);
  }
  return rows.length ? rows : null;
}

function startAnim() {
  pauseAnim();
  T0 = null;

  function frame(ts) {
    if (!T0) T0 = ts;
    const time = (ts - T0) / 1000;
    const dt = VIEW.lastTs == null ? 0 : (ts - VIEW.lastTs) / 1000;
    VIEW.lastTs = ts;
    if (!VIEW.dragging) {
      VIEW.yaw += VIEW.yawVel * dt;
      VIEW.yawVel *= Math.pow(0.0018, Math.max(0, dt));
      VIEW.spin = Math.min(1, VIEW.spin + dt);
      VIEW.autoOrbit += 0.32 * dt * VIEW.spin;
    }
    if (CART) renderScene(ctx, CART, time, VIEW);
    RAF = document.hidden ? null : requestAnimationFrame(frame);
  }
  ANIM_TICK = frame;
  resumeAnim();
}

  const res = await fetch(url);
  if (!res.ok) throw new Error(`fetch ${url} → ${res.status}`);
  return await res.json();
}

async function resolveAndLoad(input) {
  input = (input || '').trim();

  const generation = ++LOAD_GENERATION;
  let cart;
  try {
    if (input.startsWith('{')) { cart = JSON.parse(input); }
    else {
      const u = new URL(input, location.href);
      cart = await loadFromUrl(u.href);
    }
    if (generation !== LOAD_GENERATION) return;
    await loadCart(cart, generation);
    if (generation !== LOAD_GENERATION) return;
    document.getElementById('cart-json').value = JSON.stringify(cart, null, 2);
  } catch(e) {
    if (generation !== LOAD_GENERATION) return;
    document.getElementById('i-title').textContent = '✗ ' + (e.message || e);
    document.getElementById('i-title').style.color = '#f85149';

}

function markOrbitInteraction() {
  VIEW.userMoved = true;
  orbitHintEl.classList.add('hide');
}
function orbitDown(x, y) {
  VIEW.dragging = true;
  VIEW.lastX = x;
  VIEW.lastY = y;
  VIEW.yawVel = 0;
  VIEW.spin = 0;
  VIEW.lastMoveTs = null;
  canvas.classList.add('dragging');
  markOrbitInteraction();
}
function orbitMove(x, y) {
  if (!VIEW.dragging) return;
  const dx = x - VIEW.lastX, dy = y - VIEW.lastY;
  const now = performance.now();
  const moveDt = VIEW.lastMoveTs ? Math.max(0.001, (now - VIEW.lastMoveTs) / 1000) : 0.016;
  VIEW.lastMoveTs = now;
  VIEW.lastX = x; VIEW.lastY = y;
  const dyaw = -dx * 0.0105;
  VIEW.yaw += dyaw;
  VIEW.yawVel = dyaw / moveDt;
  VIEW.pitch = clamp(VIEW.pitch + dy * 0.0075, -0.85, 0.92);
}
function orbitUp() {
  VIEW.dragging = false;
  canvas.classList.remove('dragging');
  VIEW.pinch = 0;
}
function orbitZoom(delta) {
  VIEW.zoom = clamp(VIEW.zoom * Math.exp(-delta * 0.0014), 0.72, 1.9);
  markOrbitInteraction();
}
canvas.addEventListener('mousedown', e => orbitDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => orbitMove(e.clientX, e.clientY));
window.addEventListener('mouseup', orbitUp);
canvas.addEventListener('mouseleave', () => { if (VIEW.dragging) orbitUp(); else canvas.classList.remove('dragging'); });
canvas.addEventListener('wheel', e => { e.preventDefault(); orbitZoom(e.deltaY); }, { passive: false });
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) orbitDown(e.touches[0].clientX, e.touches[0].clientY);
  else if (e.touches.length === 2) {
    VIEW.pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    markOrbitInteraction();
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1) orbitMove(e.touches[0].clientX, e.touches[0].clientY);
  else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (VIEW.pinch) orbitZoom((VIEW.pinch - d) * 1.15);
    VIEW.pinch = d;
  }
}, { passive: true });
canvas.addEventListener('touchend', orbitUp);

};

/* ── postMessage housing protocol ────────────────────────────────────────── */
// Accepts {type:'hologram-init'} from a host page that embeds this player in a
// sandboxed iframe (sandbox="allow-scripts"). Replies {type:'ready'} on the
// MessageChannel port, then accepts {type:'load-cartridge', cart:{...}} and
// replies {type:'hatched', id} or {type:'hash-mismatch', got, declared}.
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'hologram-init') return;
  _pmPort = e.ports[0] || null;
  if (!_pmPort) return;
  _pmPort.onmessage = async ev => {
    const d = ev.data;
    if (d && d.type === 'load-cartridge' && d.cart) await loadCart(d.cart, ++LOAD_GENERATION, d.expectedId || null);
  };
  _pmPort.postMessage({ type: 'ready' });
});
</script></body></html>
