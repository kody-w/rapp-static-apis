<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hologram</title>
<style>
 *{box-sizing:border-box;margin:0;padding:0}
 html,body{height:100%}
 body{display:flex;flex-direction:column;background:#0d1117;color:#e6edf3;font-family:-apple-system,system-ui,Segoe UI,sans-serif}
 #status{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8b949e;padding:5px 12px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px;min-height:24px;flex-shrink:0}
 #status .ok{color:#3fb950;font-weight:700}
 #status .warn{color:#f0b429;font-weight:700}
 #status .err{color:#f85149;font-weight:700}
 #status .dim{color:#6e7681}
 iframe{flex:1;width:100%;border:none;display:block}
</style></head><body>
<div id="status"><span id="st">loading…</span></div>
<!--
  player.html runs in a sandboxed iframe (allow-scripts only, no allow-same-origin).
  The host (this page) fetches the cartridge from params, then delivers it to the
  cell via the postMessage protocol:  load-cartridge → ready / hatched / hash-mismatch.
-->
<iframe id="player" src="player.html" sandbox="allow-scripts" title="hologram player" aria-label="hologram player"></iframe>

<script>
'use strict';
const $ = id => document.getElementById(id);

/* ── helpers ── */
function b64dec(s) {
  s = String(s).replace(/-/g,'+').replace(/_/g,'/');
  while (s.length % 4) s += '=';
  return new TextDecoder().decode(Uint8Array.from(atob(s), c => c.charCodeAt(0)));
}
function setStatus(html) { $('st').innerHTML = html; }
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ── resolve cartridge from URL params (host-side, outside sandbox) ── */
const p = new URLSearchParams(location.search);
const h = (location.hash || '').slice(1);

async function fetchCart() {
  if (h) {
    try { return JSON.parse(b64dec(h)); } catch {}
  }
  if (p.has('cart')) {
    const res = await fetch(p.get('cart'));
    if (!res.ok) throw new Error(`fetch ${p.get('cart')} → ${res.status}`);
    return res.json();
  }
  if (p.has('id')) {
    const regRes = await fetch('registry.json', { cache: 'no-store' });
    if (!regRes.ok) throw new Error(`fetch registry.json → ${regRes.status}`);
    const reg = await regRes.json();
    const entry = (reg.entries || []).find(e => e.name === p.get('id') || e.id === p.get('id'));
    if (!entry) throw new Error(`id "${p.get('id')}" not found in registry`);
    const res = await fetch(new URL(entry.pin_path, location.href).href, { cache: 'no-store' });
    if (!res.ok) throw new Error(`fetch cart → ${res.status}`);
    expectedId = entry.id;
    return res.json();
  }
  return null; // no params — player shows its default cartridge
}

/* ── MessageChannel handshake with sandboxed iframe ── */
const iframe = $('player');
let port = null;
// cartP resolves once fetchCart() completes (success or failure)
let cartReady; const cartP = new Promise(r => { cartReady = r; });
let cartData = null, expectedId = null;

// Kick off cartridge fetch immediately (races with iframe load — whichever wins, ready handler waits)
(async () => {
  try {
    cartData = await fetchCart();
    if (cartData) setStatus(`<span class="dim">sandboxed · </span>loaded ${esc(cartData.title || cartData.id || '?')}`);
    else setStatus('<span class="dim">sandboxed · </span>no params — showing default cartridge');
  } catch(e) {
    setStatus(`<span class="err">✗ ${esc(e.message || e)}</span>`);
  }
  cartReady();
})();

iframe.addEventListener('load', () => {
  const ch = new MessageChannel();
  port = ch.port1;
  port.onmessage = async e => {
    const d = e.data;
    if (d.type === 'ready') {
      // Wait for host-side fetch to finish, then deliver cartridge to cell
      await cartP;
      if (cartData) port.postMessage({ type: 'load-cartridge', cart: cartData, expectedId });
    } else if (d.type === 'hatched') {
      setStatus(`<span class="dim">sandboxed · </span><span class="ok">✓ ${d.id} hatched</span>`);
    } else if (d.type === 'hash-mismatch') {
      setStatus(`<span class="dim">sandboxed · </span><span class="warn">⚠ remix · ${d.got} ≠ ${String(d.declared || '').slice(0, 12)}</span>`);
    } else if (d.type === 'quarantined') {
      setStatus('<span class="dim">sandboxed · </span><span class="err">🧫 cartridge quarantined</span>');
    }
  };
  // Transfer port2 to the sandboxed player; it listens for 'hologram-init'
  iframe.contentWindow.postMessage({ type: 'hologram-init' }, '*', [ch.port2]);
});
</script>
</body></html>
